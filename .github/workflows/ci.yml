name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main, develop]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: events_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      ENABLE_IN_MEMORY_FALLBACK: "false"
      ENABLE_DB_INTEGRATION_TESTS: "true"
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: events_db_test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/events_db_test
      CORS_ORIGINS: http://localhost:8080

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest-cov

      - name: Lint (ruff)
        run: ruff check backend

      - name: Format check (ruff)
        run: |
          ruff format --check backend/app/core/config.py
          ruff format --check backend/app/db/bootstrap.py
          ruff format --check backend/app/repositories/events_repository.py
          ruff format --check backend/app/services/events_service.py
          ruff format --check backend/tests/conftest.py
          ruff format --check backend/tests/test_fallback_behavior.py
          ruff format --check backend/tests/test_events_db_integration.py

      - name: Run tests
        run: pytest backend/tests -q --cov=backend/app --cov-report=term-missing --cov-fail-under=70

  docker-build:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t overthere-events-api:latest backend
