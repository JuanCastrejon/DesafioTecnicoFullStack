services:
  api:
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/events_db
      ENABLE_IN_MEMORY_FALLBACK: "false"
      RUN_DB_BOOTSTRAP: "true"
      SEED_EVENTS: "true"
      SEED_EVENTS_TOTAL: "10000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d events_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: